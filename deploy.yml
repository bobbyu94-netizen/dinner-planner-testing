name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - ai-testing

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-site

      - name: Checkout ai-testing
        uses: actions/checkout@v4
        with:
          ref: ai-testing
          path: testing-site

      - name: Build Pages Structure
        run: |
          mkdir public

          # Stable site
          cp main-site/index.html public/index.html

          # Testing site
          mkdir -p public/ai-testing
          cp testing-site/index.html public/ai-testing/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
