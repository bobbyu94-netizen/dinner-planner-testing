name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - ai-testing

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-site

      - name: Checkout ai-testing
        uses: actions/checkout@v4
        with:
          ref: ai-testing
          path: testing-site

      - name: Build Pages Structure
        run: |
          mkdir public

          # Stable site — copy all app files
          cp main-site/index.html public/index.html
          cp main-site/styles.css public/styles.css
          cp main-site/manifest.json public/manifest.json
          cp main-site/service-worker.js public/service-worker.js
          cp main-site/data.js public/data.js
          cp main-site/helpers.js public/helpers.js
          cp main-site/storage.js public/storage.js
          cp main-site/ui-panels.js public/ui-panels.js
          cp main-site/calendar.js public/calendar.js
          cp main-site/pantry.js public/pantry.js
          cp main-site/preferences.js public/preferences.js
          cp main-site/settings.js public/settings.js
          cp main-site/render.js public/render.js
          cp main-site/meal-actions.js public/meal-actions.js
          cp main-site/app.js public/app.js

          # Testing site — copy all app files
          mkdir -p public/ai-testing
          cp testing-site/index.html public/ai-testing/index.html
          cp testing-site/styles.css public/ai-testing/styles.css
          cp testing-site/manifest.json public/ai-testing/manifest.json
          cp testing-site/service-worker.js public/ai-testing/service-worker.js
          cp testing-site/data.js public/ai-testing/data.js
          cp testing-site/helpers.js public/ai-testing/helpers.js
          cp testing-site/storage.js public/ai-testing/storage.js
          cp testing-site/ui-panels.js public/ai-testing/ui-panels.js
          cp testing-site/calendar.js public/ai-testing/calendar.js
          cp testing-site/pantry.js public/ai-testing/pantry.js
          cp testing-site/preferences.js public/ai-testing/preferences.js
          cp testing-site/settings.js public/ai-testing/settings.js
          cp testing-site/render.js public/ai-testing/render.js
          cp testing-site/meal-actions.js public/ai-testing/meal-actions.js
          cp testing-site/app.js public/ai-testing/app.js

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
